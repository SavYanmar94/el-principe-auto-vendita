name: Update Car List
on:
  schedule:
    - cron: '0 0 */5 * *' # Parte ogni 5 giorni a mezzanotte
  workflow_dispatch: # Ti permette di farlo partire anche a mano

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python scrapingbeetest.py
      - name: Commit and push changes
        run: |
          git config --global user.name 'AutoUpdater'
          git config --global user.email 'actions@github.com'
          git add cars.json
          git commit -m "Update car list" || exit 0
          git push
