<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetrina Auto - El Principe di Bavaro</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.3s ease; display: flex; flex-direction: column; border: 1px solid #eee; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        
        .card img { width: 100%; height: 200px; object-fit: cover; }
        
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 1.1rem; font-weight: bold; margin: 0 0 10px; color: #222; min-height: 2.6em; line-height: 1.3; }
        
        .price { color: #d32f2f; font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
        .details { font-size: 0.9rem; color: #666; margin-bottom: 20px; border-top: 1px solid #eee; pt: 10px; padding-top: 10px; }
        
        /* BOTTONE AGGIORNATO COL TUO COLORE #FFC801 */
        .btn { 
            display: block; 
            text-align: center; 
            background-color: #FFC801; 
            color: #000; /* Testo nero per leggere meglio sul giallo */
            padding: 12px; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold; 
            text-transform: uppercase;
            transition: background-color 0.3s ease;
            margin-top: auto; 
        }
        
        .btn:hover { 
            background-color: #e6b400; /* Un giallo leggermente più scuro quando ci passi sopra */
        }
    </style>
</head>
<body>

    <h1>Le Nostre Occasioni</h1>
    <div class="container" id="gallery"></div>

    <script>
        fetch('cars.json')
            .then(response => response.json())
            .then(data => {
                const gallery = document.getElementById('gallery');
                data.forEach(auto => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${auto.link_immagine}" alt="${auto.modello}">
                        <div class="card-content">
                            <div class="card-title">${auto.modello}</div>
                            <div class="price">${auto.prezzo}</div>
                            <div class="details">📦 ${auto.anno} | 🛣️ ${auto.chilometraggio}</div>
                            <a href="${auto.link_annuncio}" target="_blank" class="btn">Vedi Dettagli</a>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            })
            .catch(err => console.error("Errore caricamento dati:", err));
    </script>
</body>
</html>
