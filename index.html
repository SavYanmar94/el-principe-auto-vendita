<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetrate Auto El Principe</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-content { padding: 15px; }
        .price { color: #e60000; font-size: 1.2em; font-weight: bold; }
        .details { font-size: 0.9em; color: #555; margin: 10px 0; }
        .btn { display: block; text-align: center; background: #007bff; color: white; padding: 10px; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="container" id="car-container">
        <!-- Le card verranno inserite qui da JavaScript -->
    </div>

    <script>
        // Carica i dati dal file cars.json generato dallo script
        fetch('cars.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('car-container');
                container.innerHTML = ''; // Svuota il contenitore (rimuove le vecchie macchine)

                data.forEach(auto => {
                    const card = `
                        <div class="card">
                            <img src="${auto.link_immagine}" alt="${auto.modello}">
                            <div class="card-content">
                                <h3>${auto.modello}</h3>
                                <p class="price">${auto.prezzo}</p>
                                <p class="details">${auto.anno} | ${auto.chilometraggio}</p>
                                <a href="${auto.link_annuncio}" target="_blank" class="btn">Vedi Dettagli</a>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            });
    </script>
</body>
</html>
